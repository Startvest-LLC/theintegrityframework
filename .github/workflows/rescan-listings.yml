name: Re-scan listings

on:
  schedule:
    # Weekly Sunday 04:23 UTC. Cheap canary on real-world drift.
    - cron: '23 4 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: rescan-listings
  cancel-in-progress: false

jobs:
  rescan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run re-scan
        id: rescan
        run: |
          set -o pipefail
          node .github/scripts/rescan-listings.mjs | tee rescan-stdout.txt
        continue-on-error: true

      - name: Commit history update
        if: always()
        run: |
          if git diff --quiet -- data/rescan-history.json; then
            echo "No history changes to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add data/rescan-history.json
          git commit -m "chore(rescan): record $(date -u +%Y-%m-%d) run results"
          # Push with rebase to handle racing commits during concurrent edits
          for i in 1 2 3; do
            if git push origin HEAD:master; then
              exit 0
            fi
            git pull --rebase origin master
          done
          echo "Failed to push rescan history after 3 attempts."
          exit 1

      - name: Publish report to job summary
        if: always()
        run: |
          if [ -f rescan-report.md ]; then
            cat rescan-report.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No rescan-report.md produced." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rescan-report
          path: |
            rescan-report.json
            rescan-report.md

      - name: Open issue on failure
        if: steps.rescan.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('rescan-report.md')
              ? fs.readFileSync('rescan-report.md', 'utf8')
              : 'rescan-report.md missing — see workflow logs.';
            const today = new Date().toISOString().slice(0, 10);
            const title = `Re-scan failures detected ${today}`;

            // Avoid duplicate open issues from back-to-back failed runs
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'rescan-failure',
              per_page: 5,
            });
            if (existing.data.some(i => i.title.startsWith('Re-scan failures detected'))) {
              core.info('Existing rescan-failure issue is already open; skipping new issue.');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['rescan-failure', 'automated'],
            });

      - name: Fail the job if any listing failed
        if: steps.rescan.outcome == 'failure'
        run: exit 1
