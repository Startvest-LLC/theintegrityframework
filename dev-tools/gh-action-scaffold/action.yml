name: 'integrity.md Check'
description: 'Validate an integrity.md against the TIF (The Integrity Framework) base manifest and per-product audit rules.'
author: 'Startvest LLC'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  path:
    description: 'Path to the repo root containing integrity.md (and optional audits/rules/*.json).'
    required: false
    default: '.'
  cli-version:
    description: 'Version of @startvest/integrity-cli to run. Pin to a specific version in CI; "latest" is convenient but risks drift.'
    required: false
    default: '1.3.0'
  strict:
    description: 'Fail on HIGH findings (not just CRITICAL). CLI default fails on CRITICAL only.'
    required: false
    default: 'false'
  node-version:
    description: 'Node version to install. CLI requires >= 20.'
    required: false
    default: '20'
  badge-output:
    description: 'Optional path (relative to the repo root) to write a shields.io endpoint JSON to. Leave empty to skip badge generation.'
    required: false
    default: ''
  badge-label:
    description: 'Text shown on the left side of the badge.'
    required: false
    default: 'integrity.md'

outputs:
  exit-code:
    description: 'Raw exit code from the CLI. 0=pass, 1=CRITICAL, 2=HIGH (strict only), 3=usage error.'
    value: ${{ steps.run.outputs.exit-code }}
  critical-count:
    description: 'Number of CRITICAL findings.'
    value: ${{ steps.parse.outputs.critical-count }}
  high-count:
    description: 'Number of HIGH findings.'
    value: ${{ steps.parse.outputs.high-count }}
  medium-count:
    description: 'Number of MEDIUM findings.'
    value: ${{ steps.parse.outputs.medium-count }}
  low-count:
    description: 'Number of LOW findings.'
    value: ${{ steps.parse.outputs.low-count }}
  base-version:
    description: 'Version of the TIF base manifest the CLI ran against.'
    value: ${{ steps.parse.outputs.base-version }}
  results-path:
    description: 'Filesystem path to the full JSON results file (uploadable as an artifact).'
    value: ${{ steps.run.outputs.results-path }}
  tier:
    description: 'Computed tier label: "bronze" (clean), "bronze-warn" (HIGH findings), or "fail" (CRITICAL findings).'
    value: ${{ steps.badge.outputs.tier }}
  badge-json:
    description: 'Raw shields.io endpoint JSON string. Always emitted, even when badge-output is unset.'
    value: ${{ steps.badge.outputs.badge-json }}
  badge-path:
    description: 'Filesystem path the badge JSON was written to inside the workspace (empty if badge-output was unset).'
    value: ${{ steps.badge.outputs.badge-path }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - name: Run integrity check
      id: run
      shell: bash
      run: |
        set +e
        RESULTS_PATH="${RUNNER_TEMP}/integrity-results.json"
        STRICT_FLAG=""
        if [ "${{ inputs.strict }}" = "true" ]; then
          STRICT_FLAG="--strict"
        fi
        npx --yes "@startvest/integrity-cli@${{ inputs.cli-version }}" check "${{ inputs.path }}" --format=json $STRICT_FLAG > "$RESULTS_PATH"
        EXIT_CODE=$?
        echo "exit-code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
        echo "results-path=$RESULTS_PATH" >> "$GITHUB_OUTPUT"
        # Surface a readable summary in the run log even on failure.
        echo "::group::integrity.md results"
        cat "$RESULTS_PATH" || echo "(no results file produced)"
        echo "::endgroup::"
        exit 0

    - name: Parse results
      id: parse
      shell: bash
      run: |
        RESULTS_PATH="${{ steps.run.outputs.results-path }}"
        if [ ! -s "$RESULTS_PATH" ]; then
          echo "critical-count=0" >> "$GITHUB_OUTPUT"
          echo "high-count=0" >> "$GITHUB_OUTPUT"
          echo "medium-count=0" >> "$GITHUB_OUTPUT"
          echo "low-count=0" >> "$GITHUB_OUTPUT"
          echo "base-version=unknown" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        CRIT=$(jq -r '.counts.CRITICAL // 0' "$RESULTS_PATH")
        HIGH=$(jq -r '.counts.HIGH // 0' "$RESULTS_PATH")
        MED=$(jq -r '.counts.MEDIUM // 0' "$RESULTS_PATH")
        LOW=$(jq -r '.counts.LOW // 0' "$RESULTS_PATH")
        BASE=$(jq -r '.baseVersion // "unknown"' "$RESULTS_PATH")
        echo "critical-count=$CRIT" >> "$GITHUB_OUTPUT"
        echo "high-count=$HIGH" >> "$GITHUB_OUTPUT"
        echo "medium-count=$MED" >> "$GITHUB_OUTPUT"
        echo "low-count=$LOW" >> "$GITHUB_OUTPUT"
        echo "base-version=$BASE" >> "$GITHUB_OUTPUT"
        {
          echo "## integrity.md check"
          echo ""
          echo "Base manifest: \`$BASE\`"
          echo ""
          echo "| Severity | Count |"
          echo "| --- | --- |"
          echo "| CRITICAL | $CRIT |"
          echo "| HIGH | $HIGH |"
          echo "| MEDIUM | $MED |"
          echo "| LOW | $LOW |"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Generate badge
      id: badge
      shell: bash
      run: |
        CRIT="${{ steps.parse.outputs.critical-count }}"
        HIGH="${{ steps.parse.outputs.high-count }}"
        if [ "$CRIT" -gt 0 ] 2>/dev/null; then
          TIER="fail"
          MESSAGE="needs work"
          COLOR="e05d44"
        elif [ "$HIGH" -gt 0 ] 2>/dev/null; then
          TIER="bronze-warn"
          MESSAGE="Bronze (warnings)"
          COLOR="cd7f32"
        else
          TIER="bronze"
          MESSAGE="Bronze"
          COLOR="cd7f32"
        fi
        BADGE_JSON=$(jq -nc \
          --arg label "${{ inputs.badge-label }}" \
          --arg message "$MESSAGE" \
          --arg color "$COLOR" \
          '{schemaVersion:1, label:$label, message:$message, color:$color}')
        echo "tier=$TIER" >> "$GITHUB_OUTPUT"
        echo "badge-json=$BADGE_JSON" >> "$GITHUB_OUTPUT"
        BADGE_PATH=""
        if [ -n "${{ inputs.badge-output }}" ]; then
          BADGE_PATH="${{ inputs.path }}/${{ inputs.badge-output }}"
          mkdir -p "$(dirname "$BADGE_PATH")"
          echo "$BADGE_JSON" > "$BADGE_PATH"
          echo "Wrote badge JSON to $BADGE_PATH"
        fi
        echo "badge-path=$BADGE_PATH" >> "$GITHUB_OUTPUT"

    - name: Enforce exit code
      shell: bash
      run: |
        EXIT_CODE="${{ steps.run.outputs.exit-code }}"
        if [ "$EXIT_CODE" != "0" ]; then
          echo "integrity-cli exited with code $EXIT_CODE"
          exit "$EXIT_CODE"
        fi
